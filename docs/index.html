<!DOCTYPE html>
<script src="https://d3js.org/d3.v7.min.js"></script>
<html>
    <head>
        <meta charset="UTF-8">
        <title>MLB Pitching Visualization</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Changes in MLB Pitching: A Visualization</h1>
        <figure>
            <p>
                Major League Baseball has been around since 1876. Like most things that have been around that long, 
                the game has changed and evolved over time. In 2008, MLB began tracking individual pitch data. This 
                became known as Statcast, and is one of the most prolific data gathering efforts we have seen in sports.
                <br>
                This is an interactive presentation of what we have learned and observed about pitching in MLB since 2008
                when Statcast began to publish pitch velocity and usage information.
                <br>
                The presentation begins by looking at how pitcher usage has changed since 2008.
            </p>
            <button onclick="slide1()">Begin Presentation</button>
            <button onclick="slide2()">Skip to slide 2</button>
            <svg class="chart"></svg>
            <svg class="legend"></svg>
        </figure>
        
        <script>
            function range(start, end) {
                return Array.from({length: end - start + 1}, 
                    (_, index) => start + index);
            }

            function clean_page() {
                const chart = document.querySelector("figure");
                if (chart) {
                    chart.innerHTML = "<svg class=\"chart\"></svg><svg class=\"legend\"></svg>";
                }
                const header = document.querySelector("h1");
                if (header) {
                    header.remove();
                }
            }

            function clean_textbox() {
                d3.select(".textbox").remove();
            }

            async function load_tj_data() {
                const tj_data = await d3.csv("tjdb.csv");
                // x domain is the range of years
                const x_domain_arr = range(d3.min(tj_data, d => +d.Year), d3.max(tj_data, d => +d.Year));
                // y domain is 0 to the max surgery val in a year
                const y_domain_arr = [0, d3.max(tj_data, d => +d.TJSurgeries)];
                
                // Calculate scales
                const x_scale = d3.scaleBand()
                    .domain(x_domain_arr)
                    .range([0,1000]);

                const y_scale = d3.scaleLinear()
                    .domain(y_domain_arr)
                    .range([750,0]);
                
                // make the base chart
                d3.select(".chart")
                  .attr("width", 1000 + 50)
                  .attr("height", 750 + 50)
                  .append("g").attr("transform", "translate(25, 25)")
                  .selectAll("rect")
                  .data(tj_data)
                  .enter().append("rect")
                  .attr("width", x_scale.bandwidth)
                  .attr("height", function(d){ return 750 - y_scale(d.TJSurgeries); })
                  .attr("x", function(d){ return x_scale(Number(d.Year)); })
                  .attr("y", function(d){ return y_scale(Number(d.TJSurgeries)); });

                // add axes
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 25)")
                  .call(d3.axisLeft(y_scale));
                
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 775)")
                  .call(d3.axisBottom(x_scale).tickValues([1974, 1980, 1990, 2000, 2010, 2020, 2026]));
                
                // add caption to figure
                d3.select("figure")
                  .selectAll("figcaption")
                  .data([1])
                  .enter().append("figcaption")
                  .html("Number of UCL Reconstruction surgeries per year in AA, AAA, and MLB Pitchers.");

                //add page header
                d3.select("body")
                  .insert("h1", ":first-child")
                  .html("Tommy John Surgeries over Time");
            }

            async function load_pitcher_data() {
                const p_data = await d3.csv("pitchers.csv");
                // x domain is the range of years
                const x_domain_arr_p = range(d3.min(p_data, d => +d.Year), d3.max(p_data, d => +d.Year));
                // x domain for the line is slightly different
                const x_domain_arr_i = [d3.min(p_data, d => +d.Year), d3.max(p_data, d => +d.Year)];
                // y domain for bars is custom. 400 to max so the bars take up a good amount of the page
                const y_domain_arr_p = [400, d3.max(p_data, d => +d.TotalPitchers)];
                // y domain for line will be innings pitched. This will be overlayed on the bars but have its own scale
                const y_domain_arr_i = [20, 75];

                // Calculate scales
                const x_scale_p = d3.scaleBand()
                    .domain(x_domain_arr_p)
                    .range([0,1000]);

                const y_scale_p = d3.scaleLinear()
                    .domain(y_domain_arr_p)
                    .range([750,0]);
                
                const x_scale_i = d3.scaleLinear()
                    .domain(x_domain_arr_i)
                    .range([0 + (x_scale_p.bandwidth() / 2), 1000 - (x_scale_p.bandwidth() / 2)]);
    
                const y_scale_i = d3.scaleLinear()
                    .domain(y_domain_arr_i)
                    .range([750,0]);
                
                // make the bar chart
                d3.select(".chart")
                  .attr("width", 1000 + 50)
                  .attr("height", 750 + 50)
                  .append("g").attr("transform", "translate(25, 25)")
                  .selectAll("rect")
                  .data(p_data)
                  .enter().append("rect")
                  .attr("width", x_scale_p.bandwidth)
                  .attr("height", function(d){ return 750 - y_scale_p(d.TotalPitchers); })
                  .attr("x", function(d){ return x_scale_p(Number(d.Year)); })
                  .attr("y", function(d){ return y_scale_p(Number(d.TotalPitchers)); });

                // make and plot the line but need to add the offset for the bar
                const innings = d3.line()
                    .x(d => x_scale_i(d.Year))
                    .y(d => y_scale_i(d.AverageIP));

                d3.select(".chart")
                  .append("g").attr("transform", "translate(25, 25)")
                  .append("path")
                  .attr("fill", "none")
                  .attr("stroke", "firebrick")
                  .attr("stroke-width", 3)
                  .attr("d", innings(p_data));
                
                // add axes
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 25)")
                  .call(d3.axisLeft(y_scale_p));
                
                d3.select(".chart").append("g")
                  .attr("transform", "translate(1025, 25)")
                  .call(d3.axisRight(y_scale_i));
                
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 775)")
                  .call(d3.axisBottom(x_scale_p));
                
                // build the legend
                d3.select(".legend")
                  .attr("width", 125)
                  .attr("height", 50)
                  .append("g").attr("transform", "translate(1050, 25)");
                // Line
                d3.select(".legend").append("circle")
                  .attr("cx", 10)
                  .attr("cy", 15)
                  .attr("r", 5)
                  .style("fill", "firebrick");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 20)
                  .text("Innings Pitched");
                // Line
                d3.select(".legend").append("rect")
                  .attr("x", 5)
                  .attr("y", 30)
                  .attr("height", 10).attr("width", 10)
                  .style("fill", "steelblue");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 40)
                  .text("Total Pitchers");

                //add page header
                d3.select("body")
                  .insert("h1", ":first-child")
                  .html("Pitcher Usage over Time");
            }

            async function load_velocity_data() {
                const v_data = await d3.csv("velo.csv");
                const x_domain_arr = [d3.min(v_data, d => d.Year), d3.max(v_data, d => d.Year)];
                const y_domain_arr = [75, 95];
                // calculate scales
                const x_scale = d3.scaleLinear()
                    .domain(x_domain_arr)
                    .range([0,1000]);

                const y_scale = d3.scaleLinear()
                    .domain(y_domain_arr)
                    .range([750,0]);

                // line helper functions
                const fastball = d3.line()
                    .x(d => x_scale(d.Year))
                    .y(d => y_scale(d.Average4seam));
                
                const curveball = d3.line()
                    .x(d => x_scale(d.Year))
                    .y(d => y_scale(d.AverageCurve));
                
                const changeup = d3.line()
                    .x(d => x_scale(d.Year))
                    .y(d => y_scale(d.AverageChange));
                
                const slider = d3.line()
                    .x(d => x_scale(d.Year))
                    .y(d => y_scale(d.AverageSlide));

                // define the chart
                d3.select(".chart")
                  .attr("width", 1000 + 50)
                  .attr("height", 750 + 50)
                  .append("g").attr("transform", "translate(25, 25)");

                // plot the lines
                d3.select(".chart")
                  .append("g").attr("transform", "translate(25, 25)")
                  .append("path")
                  .attr("fill", "none")
                  .attr("stroke", "firebrick")
                  .attr("stroke-width", 3)
                  .attr("d", fastball(v_data));
                
                d3.select(".chart")
                  .append("g").attr("transform", "translate(25, 25)")
                  .append("path")
                  .attr("fill", "none")
                  .attr("stroke", "steelblue")
                  .attr("stroke-width", 3)
                  .attr("d", changeup(v_data));
                
                d3.select(".chart")
                  .append("g").attr("transform", "translate(25, 25)")
                  .append("path")
                  .attr("fill", "none")
                  .attr("stroke", "goldenrod")
                  .attr("stroke-width", 3)
                  .attr("d", slider(v_data));
                  
                d3.select(".chart")
                  .append("g").attr("transform", "translate(25, 25)")
                  .append("path")
                  .attr("fill", "none")
                  .attr("stroke", "forestgreen")
                  .attr("stroke-width", 3)
                  .attr("d", curveball(v_data));

                // plot axes
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 25)")
                  .call(d3.axisLeft(y_scale));
                
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 775)")
                  .call(d3.axisBottom(x_scale).tickFormat(d3.format("d")));
                
                // build the legend
                d3.select(".legend")
                  .attr("width", 125)
                  .attr("height", 90)
                  .append("g").attr("transform", "translate(1050, 25)");
                // Fastball
                d3.select(".legend").append("circle")
                  .attr("cx", 10)
                  .attr("cy", 15)
                  .attr("r", 5)
                  .style("fill", "firebrick");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 20)
                  .text("4 Seam Fastball");
                // Changeup
                d3.select(".legend").append("circle")
                  .attr("cx", 10)
                  .attr("cy", 35)
                  .attr("r", 5)
                  .style("fill", "steelblue");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 40)
                  .text("Changeup");
                // Slider
                d3.select(".legend").append("circle")
                  .attr("cx", 10)
                  .attr("cy", 55)
                  .attr("r", 5)
                  .style("fill", "goldenrod");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 60)
                  .text("Slider");
                // Curveball
                d3.select(".legend").append("circle")
                  .attr("cx", 10)
                  .attr("cy", 75)
                  .attr("r", 5)
                  .style("fill", "forestgreen");
                d3.select(".legend")
                  .append("text")
                  .attr("x", 21)
                  .attr("y", 80)
                  .text("Curveball");

                // Page title
                d3.select("body")
                  .insert("h1", ":first-child")
                  .html("Standard Pitch Velocities over Time");
            }
        
            function generate_textbox(display_text, window_size, window_coords, button_obj) {
                const window_w = window_size[0];
                const window_h = window_size[1];
                d3.select("figure")
                  .insert("svg", ":first-child").attr("class", "textbox")
                  .attr("width", window_size[0])
                  .attr("height", window_size[1])
                  .style("left", window_coords[0])
                  .style("top", window_coords[1]);
                
                const text_w = window_w - 14;
                const text_h = window_h - 20;
                d3.select(".textbox")
                  .append("foreignObject")
                  .attr("x", 7).attr("y", 10)
                  .attr("width", text_w).attr("height", text_h)
                  .append("xhtml:text")
                  .text(display_text);
                
                if (button_obj) {
                    const button_x = (text_w - button_obj.width) / 2;
                    const button_y = text_h - button_obj.height + 5;
                    d3.select(".textbox")
                      .append("foreignObject")
                      .attr("x", button_x).attr("y", button_y)
                      .attr("width", button_obj.width).attr("height", button_obj.height)
                      .append("xhtml:button")
                      .text(button_obj.text)
                      .attr("onclick", button_obj.fn);
                }
            }

            async function slide1() {
                clean_page();
                load_pitcher_data();
                const box_text = `
                    This chart shows how the number of pitchers has changed overtime, alongside how many innings each pitcher throws on average.
                    Since 2008, the usage has steadily grown year over year, showing that the days of high-endurance starters throwing complete games have passed.
                    The modern game favors bullpen usage. Analytics indicate that it is harder for opposing batters to produce when the pitcher is new.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide1a();"
                };
                generate_textbox(box_text, [400, 225], [350, 325], next_button);    
            }

            function slide1a() {
                clean_textbox();
                const box_text = `
                    The bars indicate the total number of pitchers used in a season.
                    This includes starters, relievers, and the rare case when a position player comes in to pitch in relief.
                    In 2008, around 650 unique pitchers made an appearance. Last season in 2025, that number ballooned to around 875.
                    Note that in the COVID-19 impacted season of 2020, we still observed more pitchers than in 2008, showing how much the strategy has shifted.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide1b();"
                };
                generate_textbox(box_text, [400, 225], [100, 85], next_button); 
            }

            function slide1b() {
                clean_textbox();
                const box_text = `
                    The line indicates the average innings pitched per pitcher that season.
                    The downward trend is quite intutive, because we can see the number of pitchers drastically grow, and the length of the game has maintained steadily at 9 innings per game.
                    The MLB season has been set at 162 games per team since 1961 after the American League expanded. The only contradiction to this was in the COVID-19 impacted 2020 season, where only 60 games were played per team.
                    This creates an interesting outlier when observing this metric calculated in this way.          
                `;
                const next_button = {
                    "width": 85,
                    "height": 21,
                    "text": "Next Slide",
                    "fn": "slide2();"
                };
                generate_textbox(box_text, [475, 225], [125, 525], next_button); 
            }

            async function slide2() {
                clean_page();
                load_velocity_data();
                const box_text = `
                    Since 2008, when Statcast began to publish pitch usage data, among the most common pitches have been the 4 Seam Fastball, Changeup, Slider, and Curveball. 
                    The 4 Seam Fastball is the standard pitch, relying on velocity and location to best the batter. 
                    A Changeup uses deception of the same arm motion as a fastball, yet drastically lower velocity. This is called an "offspeed" pitch. 
                    The Slider and Curveball use spin to have horizontal (Slider) or vertical (Curveball) movement when compared to the fastball, which doesn't move much. These are referred to as "breaking balls". 
                    A pitcher may use some, all or none of these 4 pitches, as other pitch types and hybrids exist, but almost all pitchers use some combination of fastballs, offspeeds, and breaking balls.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide2a();"
                };
                generate_textbox(box_text, [500, 300], [350, 300], next_button); 
            }

            function slide2a() {
                clean_textbox();
                const box_text = `
                    This red line indicates the change in average 4 Seam Fastball velocity over time.
                    In 2008, the average 4 seamer clocked 91.6 MPH. Last year in 2025, that was up to 94.5, with some pitchers averaging 100 MPH or more.
                    Note that this line is not the fastest ball thrown that season, but rather the average pitch velocity.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide2b();"
                };
                generate_textbox(box_text, [600, 125], [300, 215], next_button); 
            }

            function slide2b() {
                clean_textbox();
                const box_text = `
                    The blue line indicates the change in average Changeup velocity over time, and the yellow line the Slider.
                    From 2008 to 2016 these pitchese were quite similar in velocity, but after 2016 the slider tended slower.
                    This is interesting because in 2015, Statcast began publishing Spin Rate statistics. 
                    This could potentially imply that after those statistics became available, pitchers began focusing on spinning their sliders for more break and less velocity, but since we dont have the data since 2008, we can't say that for sure.
                    In any case, both pitches are still being thrown faster now than before.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide2c();"
                };
                generate_textbox(box_text, [600, 200], [300, 225], next_button); 
            }

            function slide2c() {
                clean_textbox();
                const box_text = `
                    The green line is the change in average Curveball velocity. This is the slowest pitch of these four.
                    The Curveball's emphasis on spin and vertical movement mean that throwing it hard is not necessarily as important as throwing it properly.
                    Its average velocity has increased from 76.3 MPH in 2008 to 79.7 last year in 2025.
                `;
                const next_button = {
                    "width": 44,
                    "height": 21,
                    "text": "Next",
                    "fn": "slide2d();"
                };
                generate_textbox(box_text, [425, 165], [400, 540], next_button); 
            }

            function slide2d() {
                clean_textbox();
                const box_text = `
                    All 4 of these lines show the same trend: Since 2008, pitches are coming in faster and faster.
                    When combined with the previous trend of more pitchers being used per game, the strategy shift becomes very clear.
                    Use more pitchers, so each pitcher needs to throw for less innings, meaning they can throw harder on every pitch.
                    This means the fastballs will be faster, the breaking balls will have more break, and the batters will have a harder time hitting the ball.
                    However, this doesn't come without consequence.
                `;
                const next_button = {
                    "width": 85,
                    "height": 21,
                    "text": "Next Slide",
                    "fn": "slide3();"
                };
                generate_textbox(box_text, [600, 200], [300, 225], next_button); 
            }

            async function slide3() {
                clean_page();
                load_tj_data();
            }

        </script>
    </body>
</html>
