<!DOCTYPE html>
<script src="https://d3js.org/d3.v7.min.js"></script>
<html>
    <head>
        <meta charset="UTF-8">
        <title>MLB Pitching Visualization</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body onload="load_tj_data()">
        <figure>
            <svg class="chart"></svg>
        </figure>
        
        <script>
            function range(start, end) {
                return Array.from({length: end - start + 1}, 
                    (_, index) => start + index);
            }
            async function load_tj_data() {
                const tj_data = await d3.csv("tjdb.csv");
                const domain_arr = range(d3.min(tj_data, d => +d.Year), d3.max(tj_data, d => +d.Year))

                const x_scale = d3.scaleBand()
                    .domain(domain_arr)
                    .range([0,1000]);

                const y_scale = d3.scaleLinear()
                    .domain([0, d3.max(tj_data, d => +d.TJSurgeries)])
                    .range([750,0]);

                d3.select(".chart")
                  .attr("width", 1000 + 50)
                  .attr("height", 750 + 50)
                  .append("g").attr("transform", "translate(25, 25)")
                  .selectAll("rect")
                  .data(tj_data)
                  .enter().append("rect")
                  .attr("width", x_scale.bandwidth)
                  .attr("height", function(d){ return 750 - y_scale(d.TJSurgeries); })
                  .attr("x", function(d){ return x_scale(Number(d.Year)); })
                  .attr("y", function(d){ return y_scale(Number(d.TJSurgeries)); });

                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 25)")
                  .call(d3.axisLeft(y_scale));
                
                d3.select(".chart").append("g")
                  .attr("transform", "translate(25, 775)")
                  .call(d3.axisBottom(x_scale).tickValues([1974, 1980, 1990, 2000, 2010, 2020, 2026]));
                
                d3.select("figure")
                  .selectAll("figcaption")
                  .data([1])
                  .enter().append("figcaption")
                  .html("Number of UCL Reconstruction surgeries per year in AA, AAA, and MLB Pitchers.")

                d3.select("body")
                  .insert("h1", ":first-child")
                  .html("Tommy John Surgeries over Time");
            }
        </script>
    </body>
</html>
